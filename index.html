<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz di Ripasso - Corso VHF</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            /* Modificato per permettere lo scorrimento della pagina */
            padding: 40px 20px;
            margin: 0;
        }
        .quiz-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #0056b3;
            font-size: 28px;
            margin-bottom: 30px;
        }
        #loading-text {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #6c757d;
        }
        .question-block {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e9ecef;
        }
        .question-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button.option-btn {
            background-color: #e9ecef;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }
        button.option-btn:hover {
            background-color: #dee2e6;
        }
        /* Stile per la risposta selezionata in attesa di verifica */
        button.option-btn.selected {
            background-color: #cce5ff;
            border-color: #b8daff;
            color: #004085;
        }
        button.option-btn.correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
        }
        button.option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
        }
        button.option-btn:disabled {
            cursor: default;
        }
        #submit-btn {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 30px;
            width: 100%;
            text-align: center;
            display: none;
            cursor: pointer;
        }
        #submit-btn:hover {
            background-color: #004494;
        }
        
        /* Tasto Ripeti Test fissato in alto a destra */
        #sticky-restart {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none;
            z-index: 999;
        }
        #sticky-restart:hover {
            background-color: #218838;
        }

        /* Finestra Modale per il risultato */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h2 {
            margin-top: 0;
            font-size: 28px;
        }
        .pass { color: #28a745; }
        .fail { color: #dc3545; }
        .modal-content p {
            font-size: 18px;
            margin: 20px 0;
            line-height: 1.5;
        }
        .close-modal-btn {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        .close-modal-btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

<button id="sticky-restart" onclick="startQuiz()">Ripeti Test 🔄</button>

<div class="quiz-container">
    <h1>Preparazione Esame VHF 📻</h1>
    <div id="loading-text">Caricamento in corso...</div>
    
    <div id="quiz-list"></div>
    
    <button id="submit-btn" onclick="verifyTest()">Verifica</button>
</div>

<div id="result-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
        <button class="close-modal-btn" onclick="closeModal()">Guarda le correzioni</button>
    </div>
</div>

<script>
    let quizData = []; 
    let currentQuestions = [];
    let userAnswers = []; // Array per memorizzare le risposte scelte dall'utente

    const quizListEl = document.getElementById("quiz-list");
    const submitBtn = document.getElementById("submit-btn");
    const loadingText = document.getElementById("loading-text");
    const stickyRestart = document.getElementById("sticky-restart");
    const resultModal = document.getElementById("result-modal");

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    async function loadDatabaseAndStart() {
        try {
            const urlAntiCache = 'domande.json?v=' + new Date().getTime();
            const response = await fetch(urlAntiCache, { cache: 'no-store' });
            
            if (!response.ok) throw new Error("Errore di rete");
            quizData = await response.json();
            startQuiz();
        } catch (error) {
            loadingText.innerText = "Errore nel caricamento del database. Assicurati che il file domande.json esista e che non ci siano errori di sintassi.";
        }
    }

    function startQuiz() {
        // Prepara 30 domande casuali
        currentQuestions = shuffle([...quizData]).slice(0, 30);
        // Inizializza l'array delle risposte con valori nulli
        userAnswers = new Array(currentQuestions.length).fill(null);
        
        // Reset visivo
        stickyRestart.style.display = "none";
        resultModal.style.display = "none";
        submitBtn.style.display = "block";
        loadingText.style.display = "none";
        
        renderQuestions();
        window.scrollTo(0, 0);
    }

    function renderQuestions() {
        quizListEl.innerHTML = "";
        
        currentQuestions.forEach((q, qIndex) => {
            const block = document.createElement("div");
            block.className = "question-block";
            block.id = "q-block-" + qIndex;
            
            const qText = document.createElement("div");
            qText.className = "question";
            qText.innerText = `${qIndex + 1}. ${q.question}`;
            block.appendChild(qText);
            
            const optionsDiv = document.createElement("div");
            optionsDiv.className = "options";
            
            q.options.forEach((opt, oIndex) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(qIndex, oIndex, btn, optionsDiv);
                optionsDiv.appendChild(btn);
            });
            
            block.appendChild(optionsDiv);
            quizListEl.appendChild(block);
        });
    }

    function selectAnswer(qIndex, oIndex, btnClicked, optionsDiv) {
        // Se il test è già stato verificato (tasto ripeti visibile), blocca le modifiche
        if (stickyRestart.style.display === "block") return;

        // Salva la scelta dell'utente
        userAnswers[qIndex] = oIndex;
        
        // Rimuove la selezione precedente in questa specifica domanda
        const buttons = optionsDiv.querySelectorAll("button");
        buttons.forEach(btn => btn.classList.remove("selected"));
        
        // Evidenzia la nuova scelta
        btnClicked.classList.add("selected");
    }

    function verifyTest() {
        // Controlla se l'utente ha risposto a tutte le domande
        if (userAnswers.includes(null)) {
            alert("Attenzione: devi rispondere a tutte le 30 domande prima di verificare il test!");
            return;
        }

        let errorsCount = 0;
        
        // Calcola gli errori
        currentQuestions.forEach((q, index) => {
            if (userAnswers[index] !== q.answer) {
                errorsCount++;
            }
        });
        
        const modalTitle = document.getElementById("modal-title");
        const modalText = document.getElementById("modal-text");
        
        // Logica per passare il test (massimo 3 errori)
        if (errorsCount <= 3) {
            modalTitle.innerText = "Test Passato! 🎉";
            modalTitle.className = "pass";
        } else {
            modalTitle.innerText = "Test Non Passato";
            modalTitle.className = "fail";
        }
        
        modalText.innerHTML = `Hai commesso <strong>${errorsCount}</strong> errori su ${currentQuestions.length} domande.<br><br>Risposte esatte: ${currentQuestions.length - errorsCount}/${currentQuestions.length}`;
        
        resultModal.style.display = "flex";
    }

    function closeModal() {
        resultModal.style.display = "none";
        submitBtn.style.display = "none";
        stickyRestart.style.display = "block";
        
        showCorrections();
        window.scrollTo(0, 0); // Torna all'inizio per rivedere le correzioni
    }

    function showCorrections() {
        currentQuestions.forEach((q, qIndex) => {
            const block = document.getElementById("q-block-" + qIndex);
            const buttons = block.querySelectorAll("button");
            
            // Disabilita tutti i pulsanti
            buttons.forEach(btn => btn.disabled = true);
            
            const selectedOpt = userAnswers[qIndex];
            
            if (selectedOpt === q.answer) {
                // Risposta esatta
                buttons[selectedOpt].classList.add("correct");
                buttons[selectedOpt].classList.remove("selected");
            } else {
                // Risposta sbagliata
                buttons[selectedOpt].classList.add("wrong");
                buttons[selectedOpt].classList.remove("selected");
                // Evidenzia quella che era corretta
                buttons[q.answer].classList.add("correct");
            }
        });
    }

    window.onload = loadDatabaseAndStart;
</script>

</body>
</html>
